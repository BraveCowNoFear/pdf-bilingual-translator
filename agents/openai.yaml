interface:
  display_name: "PDF Bilingual Translator"
  short_description: "Parallel LaTeX PDF translation"
  default_prompt: "Translate the attached PDFs into polished Simplified Chinese. Rebuild body text, captions, tables, and formulas from scratch in LaTeX; keep headers/footers; use original PDF-derived figure assets with bilingual label masks/overlays; shard translation by disjoint continuous segment ranges; each worker must return complete LaTeX, assets, segment PDF, and pass 1/pass 2 page renders; then use fresh QA workers for pass 3/pass 4, assigned by whole segment ranges only, that directly fix LaTeX/assets and rerender. Do not use third-party translation, whole-page PDF backgrounds, screenshot tables, or JSON translation deliverables."
